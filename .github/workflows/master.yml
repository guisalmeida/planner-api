name: CI

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    name: 'Build and push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

#      - name: Run tests
#        run: ...

      - name: Generate SHA
        id: generate_sha
        run: |
          SHA=$(echo $GITHUB_SHA | head -c7)
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

#      - name: Build docker image
#        run: docker build -t guisalmeida/planner.api:${{ steps.generate_sha.outputs.sha }} .
#
#      - name: Push image
#        run: |
#          docker push guisalmeida/planner.api:${{ steps.generate_sha.outputs.sha }}
#          docker tag guisalmeida/planner.api:${{ steps.generate_sha.outputs.sha }} guisalmeida/planner.api:latest
#          docker push guisalmeida/planner.api:latest

      - name: Build & Push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: |
            guisalmeida/planner.api:${{ steps.generate_sha.outputs.sha }}
            guisalmeida/planner.api:latest